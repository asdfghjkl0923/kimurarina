<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>モグラたたきゲーム</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    text-align: center;
    background: #87CEEB;
}

h1 {
    margin: 10px;
}

#info {
    margin: 10px;
    font-size: 18px;
}

#game {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 90vw;
    max-width: 400px;
    margin: auto;
}

.hole {
    background: #5a3d1e;
    border-radius: 50%;
    height: 100px;
    position: relative;
    overflow: hidden;
}

/* モグラ */
.mole {
    width: 70px;
    height: 70px;
    background: #8b5a2b;
    border-radius: 50%;
    position: absolute;
    bottom: -70px;
    left: 50%;
    transform: translateX(-50%);
    transition: 0.2s;
}

/* 顔パーツ */
.eye {
    width: 8px;
    height: 8px;
    background: black;
    border-radius: 50%;
    position: absolute;
    top: 20px;
}

.eye.left { left: 18px; }
.eye.right { right: 18px; }

.nose {
    width: 10px;
    height: 10px;
    background: pink;
    border-radius: 50%;
    position: absolute;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
}

/* 出現 */
.mole.show {
    bottom: 10px;
}

button {
    margin: 10px;
    padding: 10px 20px;
    font-size: 16px;
}
</style>
</head>

<body>

<h1>モグラたたき🐹</h1>

<div id="info">
    スコア: <span id="score">0</span> |
    残り時間: <span id="time">20</span>
</div>

<div id="game"></div>

<button onclick="startGame()">スタート</button>
<button onclick="startGame()">リトライ</button>

<script>
const game = document.getElementById("game");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");

let score = 0;
let time = 20;
let timer;
let moleTimer;

// 穴生成
for (let i = 0; i < 9; i++) {
    const hole = document.createElement("div");
    hole.classList.add("hole");

    const mole = document.createElement("div");
    mole.classList.add("mole");

    // 顔作成
    const eyeL = document.createElement("div");
    eyeL.classList.add("eye", "left");

    const eyeR = document.createElement("div");
    eyeR.classList.add("eye", "right");

    const nose = document.createElement("div");
    nose.classList.add("nose");

    mole.appendChild(eyeL);
    mole.appendChild(eyeR);
    mole.appendChild(nose);

    // タップ
    mole.addEventListener("click", () => {
        if (mole.classList.contains("show")) {
            score++;
            scoreEl.textContent = score;
            mole.classList.remove("show");
        }
    });

    hole.appendChild(mole);
    game.appendChild(hole);
}

// モグラ出現
function showMole() {
    const moles = document.querySelectorAll(".mole");
    moles.forEach(m => m.classList.remove("show"));

    const index = Math.floor(Math.random() * moles.length);
    moles[index].classList.add("show");
}

// ゲーム開始（リトライ兼用）
function startGame() {
    score = 0;
    time = 20;
    scoreEl.textContent = score;
    timeEl.textContent = time;

    clearInterval(timer);
    clearInterval(moleTimer);

    moleTimer = setInterval(showMole, 800);

    timer = setInterval(() => {
        time--;
        timeEl.textContent = time;

        if (time <= 0) {
            clearInterval(timer);
            clearInterval(moleTimer);
            alert("終了！スコア: " + score);
        }
    }, 1000);
}
</script>

</body>
</html>
