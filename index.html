<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>モグラたたきげーむ🌱</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    text-align: center;
    background: #8B5A2B;
}

h1, #info, #combo {
    color: white;
}

#combo {
    font-size: 20px;
}

/* ゲーム */
#game {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 90vw;
    max-width: 400px;
    margin: auto;
    position: relative;
    z-index: 1;
}

.hole {
    background: #5a3d1e;
    border-radius: 50%;
    height: 100px;
    position: relative;
    overflow: hidden;
}

.mole {
    width: 70px;
    height: 70px;
    background: #a0522d;
    border-radius: 50%;
    position: absolute;
    bottom: -70px;
    left: 50%;
    transform: translateX(-50%);
    transition: 0.2s;
}

.mole.fake { background: red; }

.eye {
    width: 8px;
    height: 8px;
    background: black;
    border-radius: 50%;
    position: absolute;
    top: 20px;
}
.eye.left { left: 18px; }
.eye.right { right: 18px; }

.nose {
    width: 10px;
    height: 10px;
    background: pink;
    border-radius: 50%;
    position: absolute;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
}

.mole.show { bottom: 10px; }
.mole.hit { transform: translateX(-50%) scale(0.8); }

.effect {
    position: absolute;
    font-weight: bold;
    font-size: 18px;
    animation: pop 0.5s forwards;
}

@keyframes pop {
    0% { transform: scale(0.5); opacity: 1; }
    100% { transform: scale(1.5); opacity: 0; }
}

.scorePlus { color: white; }
.scoreMinus { color: cyan; }

button {
    margin: 10px;
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    background: #ffcc66;
}

/* 画面共通 */
.overlay {
    position: fixed;
    z-index: 9999;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.hidden {
    display: none;
}

/* カウントダウン */
#countText {
    font-size: 80px;
}
</style>
</head>

<body>

<!-- ルール -->
<div id="ruleScreen" class="overlay">
    <h2>ルール説明</h2>
    <p>
        😀 モグラをタップ！<br>
        😈 赤はフェイク（減点）<br>
        🔥 コンボで高得点！
    </p>
    <button onclick="startFromRule()">スタート</button>
</div>

<!-- カウントダウン -->
<div id="countdown" class="overlay hidden">
    <h1 id="countText">3</h1>
</div>

<!-- リザルト -->
<div id="resultScreen" class="overlay hidden">
    <h2>RESULT 🎊</h2>
    <p id="finalScore"></p>
    <p id="maxCombo"></p>
    <button onclick="restartGame()">もう一回</button>
    <button onclick="backToRule()">ルールへ</button>
</div>

<h1>モグラたたきゲーム🌱</h1>

<div id="combo">コンボ: 0</div>

<div id="info">
    スコア: <span id="score">0</span> |
    残り時間: <span id="time">20</span>
</div>

<div id="game"></div>

<button onclick="togglePause()" id="pauseBtn">一時停止</button>

<script>
const game = document.getElementById("game");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");
const comboEl = document.getElementById("combo");

const pauseBtn = document.getElementById("pauseBtn");
const ruleScreen = document.getElementById("ruleScreen");
const resultScreen = document.getElementById("resultScreen");

const countdown = document.getElementById("countdown");
const countText = document.getElementById("countText");

const finalScore = document.getElementById("finalScore");
const maxComboText = document.getElementById("maxCombo");

let score = 0;
let time = 20;
let combo = 0;
let maxCombo = 0;
let timer;
let moleTimer;
let isPaused = false;

/* ===== 画面操作 ===== */
function startFromRule() {
    ruleScreen.classList.add("hidden");
    startCountdown();
}

function restartGame() {
    resultScreen.classList.add("hidden");
    startCountdown();
}

function backToRule() {
    resultScreen.classList.add("hidden");
    ruleScreen.classList.remove("hidden");
}

/* ===== カウントダウン ===== */
function startCountdown() {
    let count = 3;
    countdown.classList.remove("hidden");
    countText.textContent = count;

    const interval = setInterval(() => {
        count--;

        if (count > 0) {
            countText.textContent = count;
        } else if (count === 0) {
            countText.textContent = "GO!";
        } else {
            clearInterval(interval);
            countdown.classList.add("hidden");
            startGame();
        }
    }, 1000);
}

/* ===== モグラ生成 ===== */
for (let i = 0; i < 9; i++) {
    const hole = document.createElement("div");
    hole.classList.add("hole");

    const mole = document.createElement("div");
    mole.classList.add("mole");

    const eyeL = document.createElement("div");
    eyeL.classList.add("eye", "left");

    const eyeR = document.createElement("div");
    eyeR.classList.add("eye", "right");

    const nose = document.createElement("div");
    nose.classList.add("nose");

    mole.appendChild(eyeL);
    mole.appendChild(eyeR);
    mole.appendChild(nose);

    mole.addEventListener("click", () => {
        if (!mole.classList.contains("show") || isPaused) return;

        mole.classList.add("hit");

        const effect = document.createElement("div");
        effect.classList.add("effect");

        if (mole.dataset.fake === "true") {
            score--;
            combo = 0;
            effect.textContent = "MISS!";
            effect.classList.add("scoreMinus");
        } else {
            combo++;
            if (combo > maxCombo) maxCombo = combo;

            let add = 1;
            if (combo >= 10) add = 3;
            else if (combo >= 5) add = 2;

            score += add;
            effect.textContent = "+" + add;
            effect.classList.add("scorePlus");
        }

        scoreEl.textContent = score;
        comboEl.textContent = "コンボ: " + combo;

        mole.appendChild(effect);

        setTimeout(() => {
            mole.classList.remove("show", "hit");
            effect.remove();
        }, 300);
    });

    hole.appendChild(mole);
    game.appendChild(hole);
}

/* ===== モグラ出現 ===== */
function showMole() {
    const moles = document.querySelectorAll(".mole");
    moles.forEach(m => m.classList.remove("show"));

    const mole = moles[Math.floor(Math.random() * moles.length)];

    if (Math.random() < 0.2) {
        mole.dataset.fake = "true";
        mole.classList.add("fake");
    } else {
        mole.dataset.fake = "false";
        mole.classList.remove("fake");
    }

    mole.classList.add("show");
}

/* ===== ゲーム開始 ===== */
function startGame() {
    score = 0;
    time = 20;
    combo = 0;
    maxCombo = 0;
    isPaused = false;

    scoreEl.textContent = score;
    timeEl.textContent = time;
    comboEl.textContent = "コンボ: 0";
    pauseBtn.textContent = "一時停止";

    clearInterval(timer);
    clearInterval(moleTimer);

    moleTimer = setInterval(() => {
        if (!isPaused) showMole();
    }, 800);

    timer = setInterval(() => {
        if (!isPaused) {
            time--;
            timeEl.textContent = time;

            if (time <= 0) {
                clearInterval(timer);
                clearInterval(moleTimer);

                finalScore.textContent = "スコア: " + score;
                maxComboText.textContent = "最大コンボ: " + maxCombo;

                resultScreen.classList.remove("hidden");
            }
        }
    }, 1000);
}

/* ===== 一時停止 ===== */
function togglePause() {
    isPaused = !isPaused;
    pauseBtn.textContent = isPaused ? "再開" : "一時停止";
}
</script>

</body>
</html>
