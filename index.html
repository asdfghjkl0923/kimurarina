<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>モグラたたきゲーム</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    text-align: center;

    /* 🌱 全面畑（土） */
    background: #8B5A2B;
}

h1 {
    margin: 10px;
    color: white;
}

#info {
    margin: 10px;
    font-size: 18px;
    color: white;
}

#game {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 90vw;
    max-width: 400px;
    margin: auto;
}

.hole {
    background: #5a3d1e;
    border-radius: 50%;
    height: 100px;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 5px 10px rgba(0,0,0,0.3);
}

/* モグラ */
.mole {
    width: 70px;
    height: 70px;
    background: #a0522d;
    border-radius: 50%;
    position: absolute;
    bottom: -70px;
    left: 50%;
    transform: translateX(-50%);
    transition: 0.2s;
}

/* 顔 */
.eye {
    width: 8px;
    height: 8px;
    background: black;
    border-radius: 50%;
    position: absolute;
    top: 20px;
}

.eye.left { left: 18px; }
.eye.right { right: 18px; }

.nose {
    width: 10px;
    height: 10px;
    background: pink;
    border-radius: 50%;
    position: absolute;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
}

/* 出現 */
.mole.show {
    bottom: 10px;
}

button {
    margin: 10px;
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    background: #ffcc66;
}
</style>
</head>

<body>

<h1>モグラたたき🐹</h1>

<div id="info">
    スコア: <span id="score">0</span> |
    残り時間: <span id="time">20</span>
</div>

<div id="game"></div>

<button onclick="startGame()">スタート</button>
<button onclick="togglePause()" id="pauseBtn">一時停止</button>

<script>
const game = document.getElementById("game");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");
const pauseBtn = document.getElementById("pauseBtn");

let score = 0;
let time = 20;
let timer;
let moleTimer;
let isPaused = false;

// 穴生成
for (let i = 0; i < 9; i++) {
    const hole = document.createElement("div");
    hole.classList.add("hole");

    const mole = document.createElement("div");
    mole.classList.add("mole");

    const eyeL = document.createElement("div");
    eyeL.classList.add("eye", "left");

    const eyeR = document.createElement("div");
    eyeR.classList.add("eye", "right");

    const nose = document.createElement("div");
    nose.classList.add("nose");

    mole.appendChild(eyeL);
    mole.appendChild(eyeR);
    mole.appendChild(nose);

    mole.addEventListener("click", () => {
        if (mole.classList.contains("show") && !isPaused) {
            score++;
            scoreEl.textContent = score;
            mole.classList.remove("show");
        }
    });

    hole.appendChild(mole);
    game.appendChild(hole);
}

// モグラ出現
function showMole() {
    const moles = document.querySelectorAll(".mole");
    moles.forEach(m => m.classList.remove("show"));

    const index = Math.floor(Math.random() * moles.length);
    moles[index].classList.add("show");
}

// ゲーム開始
function startGame() {
    score = 0;
    time = 20;
    isPaused = false;
    pauseBtn.textContent = "一時停止";

    scoreEl.textContent = score;
    timeEl.textContent = time;

    clearInterval(timer);
    clearInterval(moleTimer);

    moleTimer = setInterval(() => {
        if (!isPaused) showMole();
    }, 800);

    timer = setInterval(() => {
        if (!isPaused) {
            time--;
            timeEl.textContent = time;

            if (time <= 0) {
                clearInterval(timer);
                clearInterval(moleTimer);
                alert("終了！スコア: " + score);
            }
        }
    }, 1000);
}

// 一時停止
function togglePause() {
    isPaused = !isPaused;

    if (isPaused) {
        pauseBtn.textContent = "再開";
    } else {
        pauseBtn.textContent = "一時停止";
    }
}
</script>

</body>
</html>
