<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ミニRPGバトル</title>
<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #222;
  color: white;
}

#game {
  margin-top: 30px;
}

.bar {
  width: 200px;
  height: 20px;
  background: #555;
  margin: 10px auto;
  border-radius: 10px;
}

.hp {
  height: 100%;
  background: lime;
  border-radius: 10px;
}

button {
  margin: 5px;
  padding: 10px 20px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.attack { background: red; color: white; }
.heal { background: green; color: white; }

#log {
  margin-top: 20px;
  height: 100px;
}
</style>
</head>
<body>

<h1>⚔️ ミニRPGバトル</h1>

<div id="game">

  <h2>プレイヤー</h2>
  <div class="bar"><div id="playerHP" class="hp"></div></div>
  <p id="playerText"></p>

  <h2>モンスター</h2>
  <div class="bar"><div id="enemyHP" class="hp"></div></div>
  <p id="enemyText"></p>

  <button class="attack" onclick="attack()">攻撃</button>
  <button class="heal" onclick="heal()">回復</button>

  <div id="log"></div>

</div>

<script>
let playerMax = 100;
let playerHP = 100;

let enemyMax = 100;
let enemyHP = 100;

function updateUI() {
  document.getElementById("playerHP").style.width = (playerHP/playerMax*100) + "%";
  document.getElementById("enemyHP").style.width = (enemyHP/enemyMax*100) + "%";

  document.getElementById("playerText").textContent = playerHP + " / " + playerMax;
  document.getElementById("enemyText").textContent = enemyHP + " / " + enemyMax;
}

function log(text) {
  document.getElementById("log").innerHTML = text;
}

function attack() {
  let damage = Math.floor(Math.random() * 20) + 5;
  enemyHP -= damage;

  log("💥 敵に " + damage + " ダメージ！");

  if (enemyHP <= 0) {
    enemyHP = 0;
    updateUI();
    log("🎉 勝利！！");
    return;
  }

  enemyTurn();
  updateUI();
}

function heal() {
  let heal = Math.floor(Math.random() * 15) + 10;
  playerHP += heal;
  if (playerHP > playerMax) playerHP = playerMax;

  log("💚 " + heal + " 回復した！");

  enemyTurn();
  updateUI();
}

function enemyTurn() {
  let damage = Math.floor(Math.random() * 15) + 5;
  playerHP -= damage;

  if (playerHP <= 0) {
    playerHP = 0;
    updateUI();
    log("💀 ゲームオーバー...");
    return;
  }

  log(document.getElementById("log").innerHTML + "<br>👿 敵の攻撃！" + damage + "ダメージ");
}

updateUI();
</script>

</body>
</html>
